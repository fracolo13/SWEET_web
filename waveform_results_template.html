<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWEET - Waveform Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-unit {
            font-size: 0.5em;
            color: #999;
            font-weight: normal;
        }
        
        .plots-section {
            padding: 30px;
        }
        
        .section-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .plots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        
        .plot-card {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .plot-card img {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .plot-card img:hover {
            transform: scale(1.02);
        }
        
        .plot-title {
            padding: 15px;
            font-weight: bold;
            color: #333;
            background: white;
        }
        
        .downloads-section {
            padding: 30px;
            background: #f8f9fa;
        }
        
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .download-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .download-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .download-link {
            display: block;
            padding: 10px 15px;
            margin: 8px 0;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            transition: background 0.3s;
        }
        
        .download-link:hover {
            background: #5568d3;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
        }
        
        .modal-content {
            position: relative;
            margin: 2% auto;
            width: 90%;
            max-width: 1200px;
        }
        
        .modal-content img {
            width: 100%;
            height: auto;
        }
        
        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .progress {
            padding: 20px;
            text-align: center;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            margin: 20px;
            border-radius: 5px;
        }
        
        .success {
            padding: 20px;
            text-align: center;
            background: #d4edda;
            border-left: 4px solid #28a745;
            margin: 20px;
            border-radius: 5px;
        }
        
        .error {
            padding: 20px;
            text-align: center;
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            margin: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Synthetic Waveform Results</h1>
            <p id="event-title">Earthquake Event Analysis</p>
        </div>
        
        <!-- Status Messages -->
        <div id="status-message"></div>
        
        <!-- Statistics Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Magnitude</div>
                <div class="stat-value" id="magnitude">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stations</div>
                <div class="stat-value" id="num-stations">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Max PGA</div>
                <div class="stat-value" id="max-pga">-<span class="stat-unit">m/s²</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Mean PGA</div>
                <div class="stat-value" id="mean-pga">-<span class="stat-unit">m/s²</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Max PGV</div>
                <div class="stat-value" id="max-pgv">-<span class="stat-unit">m/s</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Distance Range</div>
                <div class="stat-value" id="distance-range">-<span class="stat-unit">km</span></div>
            </div>
        </div>
        
        <!-- Plots Section -->
        <div class="plots-section">
            <h2 class="section-title">📊 Analysis Plots</h2>
            <div class="plots-grid" id="plots-grid">
                <!-- Plots will be inserted here by JavaScript -->
            </div>
        </div>
        
        <!-- Downloads Section -->
        <div class="downloads-section">
            <h2 class="section-title">⬇️ Downloads</h2>
            <div class="download-grid">
                <div class="download-card">
                    <h3>Waveform Data</h3>
                    <div id="mseed-downloads">
                        <!-- MSEED download links will be inserted here -->
                    </div>
                </div>
                <div class="download-card">
                    <h3>Plots</h3>
                    <div id="plot-downloads">
                        <!-- Plot download links will be inserted here -->
                    </div>
                </div>
                <div class="download-card">
                    <h3>Data Files</h3>
                    <div id="data-downloads">
                        <!-- Data download links will be inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <div class="modal-content">
            <img id="modal-img" src="" alt="">
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5001';
        
        // Generate and display waveforms
        async function generateWaveforms() {
            try {
                showProgress('Summing waveforms...');
                
                // Get data from your UI (replace with actual functions)
                const subsources = getSubsourcesFromUI();
                const stations = getStationsFromUI();
                
                // 1. Sum waveforms
                const sumResponse = await fetch(`${API_BASE}/api/waveforms/sum`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        subsources: subsources,
                        stations: stations,
                        templates_dir: '/path/to/templates',
                        n_realizations: 1,
                        sampling_rate: 100.0,
                        moment_scale: false,
                        amplitude_scale: 1.0,
                        min_template_dist_km: 10.0
                    })
                });
                
                if (!sumResponse.ok) {
                    throw new Error(`HTTP error! status: ${sumResponse.status}`);
                }
                
                const sumResult = await sumResponse.json();
                
                showProgress('Analyzing waveforms and generating plots...');
                
                // 2. Analyze and plot
                const analysisResponse = await fetch(`${API_BASE}/api/waveforms/analyze`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        mseed_file: sumResult.output_files[0],
                        subsources: subsources,
                        stations: stations,
                        title_prefix: 'Synthetic Event'
                    })
                });
                
                if (!analysisResponse.ok) {
                    throw new Error(`HTTP error! status: ${analysisResponse.status}`);
                }
                
                const analysisResult = await analysisResponse.json();
                
                // 3. Display results
                displayResults(sumResult, analysisResult);
                showSuccess('Waveform generation and analysis complete!');
                
            } catch (error) {
                showError(`Error: ${error.message}`);
                console.error(error);
            }
        }
        
        function displayResults(sumResult, analysisResult) {
            const stats = analysisResult.statistics;
            
            // Update statistics
            document.getElementById('magnitude').textContent = 
                stats.magnitude ? `Mw ${stats.magnitude.toFixed(1)}` : '-';
            document.getElementById('num-stations').textContent = stats.num_stations;
            document.getElementById('max-pga').innerHTML = 
                `${stats.pga_max.toFixed(3)}<span class="stat-unit">m/s²</span>`;
            document.getElementById('mean-pga').innerHTML = 
                `${stats.pga_mean.toFixed(3)}<span class="stat-unit">m/s²</span>`;
            document.getElementById('max-pgv').innerHTML = 
                `${stats.pgv_max.toFixed(4)}<span class="stat-unit">m/s</span>`;
            document.getElementById('distance-range').innerHTML = 
                `${stats.distance_min.toFixed(0)}-${stats.distance_max.toFixed(0)}<span class="stat-unit">km</span>`;
            
            // Display plots
            const plotsGrid = document.getElementById('plots-grid');
            plotsGrid.innerHTML = '';
            
            const plotNames = {
                'waveform_overview': 'Waveform Overview',
                'pga_vs_distance': 'PGA vs Distance',
                'pgv_vs_distance': 'PGV vs Distance',
                'shakemap': 'Shakemap'
            };
            
            for (const [key, path] of Object.entries(analysisResult.plots)) {
                const plotCard = document.createElement('div');
                plotCard.className = 'plot-card';
                plotCard.innerHTML = `
                    <div class="plot-title">${plotNames[key] || key}</div>
                    <img src="file://${path}" alt="${plotNames[key]}" onclick="openModal(this.src)">
                `;
                plotsGrid.appendChild(plotCard);
            }
            
            // Create download links
            createDownloadLinks(sumResult, analysisResult);
        }
        
        function createDownloadLinks(sumResult, analysisResult) {
            // MSEED downloads
            const mseedDiv = document.getElementById('mseed-downloads');
            mseedDiv.innerHTML = '';
            sumResult.output_files.forEach((file, idx) => {
                const filename = file.split('/').pop();
                const link = document.createElement('a');
                link.href = `${API_BASE}/api/waveforms/download/${filename}`;
                link.className = 'download-link';
                link.textContent = `Realization ${idx + 1}`;
                link.download = filename;
                mseedDiv.appendChild(link);
            });
            
            // Plot downloads
            const plotDiv = document.getElementById('plot-downloads');
            plotDiv.innerHTML = '';
            for (const [key, path] of Object.entries(analysisResult.plots)) {
                const link = document.createElement('a');
                link.href = path;
                link.className = 'download-link';
                link.textContent = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                link.download = `${key}.png`;
                plotDiv.appendChild(link);
            }
            
            // Data downloads
            const dataDiv = document.getElementById('data-downloads');
            dataDiv.innerHTML = '';
            const statsLink = document.createElement('a');
            statsLink.href = analysisResult.data.statistics;
            statsLink.className = 'download-link';
            statsLink.textContent = 'Statistics (JSON)';
            statsLink.download = 'statistics.json';
            dataDiv.appendChild(statsLink);
            
            const csvLink = document.createElement('a');
            csvLink.href = analysisResult.data.detailed_csv;
            csvLink.className = 'download-link';
            csvLink.textContent = 'Detailed Data (CSV)';
            csvLink.download = 'waveform_analysis.csv';
            dataDiv.appendChild(csvLink);
        }
        
        function showProgress(message) {
            document.getElementById('status-message').innerHTML = 
                `<div class="progress">${message}</div>`;
        }
        
        function showSuccess(message) {
            document.getElementById('status-message').innerHTML = 
                `<div class="success">✅ ${message}</div>`;
        }
        
        function showError(message) {
            document.getElementById('status-message').innerHTML = 
                `<div class="error">❌ ${message}</div>`;
        }
        
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modal-img');
            modal.style.display = 'block';
            modalImg.src = src;
        }
        
        // Close modal
        document.querySelector('.close').onclick = function() {
            document.getElementById('imageModal').style.display = 'none';
        };
        
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        };
        
        // Placeholder functions - replace with your actual UI functions
        function getSubsourcesFromUI() {
            // Replace with actual function to get subsources from your UI
            return [];
        }
        
        function getStationsFromUI() {
            // Replace with actual function to get stations from your UI
            return [];
        }
        
        // Call this function when user clicks "Generate Waveforms" button
        // generateWaveforms();
    </script>
</body>
</html>
